[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc_version = "0.8.28"
evm_version = "prague"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
shannon = "${SHANNON_RPC_URL}"
somnia = "${SOMNIA_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
